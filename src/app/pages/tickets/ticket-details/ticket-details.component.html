@if(ticket) {
<mat-card>
  <mat-card-title>Ticket #{{ ticket.smallId }}</mat-card-title>
  <mat-card-subtitle
    >{{ ticket.client.name }} / {{ ticket.client.cnpj }}</mat-card-subtitle
  >

  <mat-card-footer>
    <mat-card-actions>
      <button mat-button (click)="backToTickets()">Voltar</button>
    </mat-card-actions>
  </mat-card-footer>
</mat-card>
} @else { Ticket não encontrado }
